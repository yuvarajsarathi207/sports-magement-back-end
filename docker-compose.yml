services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: kp-backend-app
    container_name: kp-backend-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - kp-network
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: kp-backend-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - kp-network
    depends_on:
      - app

  db:
    image: postgres:15-alpine
    container_name: kp-backend-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-kp_tournament}
      POSTGRES_USER: ${DB_USERNAME:-kp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kp_password}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kp-network

networks:
  kp-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local

