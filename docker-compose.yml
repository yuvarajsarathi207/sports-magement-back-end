services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: kp-backend-app
    container_name: kp-backend-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - kp-network
    depends_on:
      - mysql
      - postgres
    environment:
      - DB_CONNECTION=${DB_CONNECTION:-mysql}

  nginx:
    image: nginx:alpine
    container_name: kp-backend-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - kp-network
    depends_on:
      - app

  # MySQL Database Service
#   mysql:
#     image: mysql:8.0
#     container_name: kp-backend-mysql
#     restart: unless-stopped
#     environment:
#       MYSQL_DATABASE: ${DB_DATABASE:-kp_tournament}
#       MYSQL_USER: ${DB_USERNAME:-kp_user}
#       MYSQL_PASSWORD: ${DB_PASSWORD:-kp_password}
#       MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
#     ports:
#       - "3306:3306"
#     volumes:
#       - mysql_data:/var/lib/mysql
#     networks:
#       - kp-network
#     command: --default-authentication-plugin=mysql_native_password

  # PostgreSQL Database Service
  postgres:
    image: postgres:15-alpine
    container_name: kp-backend-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-kp_tournament}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kp_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kp-network

networks:
  kp-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  postgres_data:
    driver: local

